name: Fetch NBG Rates

on:
  schedule:
    - cron: '0 4 * * 1-5'  # target 11am Tbilisi (UTC+4): schedule 4am UTC to offset ~3h GitHub Actions queue delay
  workflow_dispatch:

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: npm install playwright && npx playwright install --with-deps chromium

      - name: Fetch rates from NBG
        run: node fetch-rates.js

      - name: Commit rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "chore: update NBG rates for $(date -u +%Y-%m-%d)"
          git push
