name: Fetch NBG Rates

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 7am UTC weekdays (NBG publishes ~10am Tbilisi time = 6am UTC)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch rates from NBG
        run: |
          DATE=$(date -u +%Y-%m-%d)
          CURRENCIES="USD TRY UAH INR"
          RESULT="[]"
          for C in $CURRENCIES; do
            DATA=$(curl -s "https://www.nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/ka/json/?currencies=$C&date=$DATE")
            CURRENCY=$(echo "$DATA" | jq '.[0].currencies[0]')
            RESULT=$(echo "$RESULT" | jq --argjson c "$CURRENCY" '. + [$c]')
          done
          echo "{\"date\":\"$DATE\",\"currencies\":$RESULT}" > rates.json

      - name: Commit rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "chore: update NBG rates for $(date -u +%Y-%m-%d)"
          git push
